<div style="width:100%;padding:16px 0;">
  <iframe
    src="{{ block.settings.widget_url }}"
    style="width:100%;height:700px;border:none;border-radius:16px;display:block;"
    allow="payment *"
    loading="lazy"
    title="Blind Box Shop"
  ></iframe>
</div>
{{{{raw}}}}
{{ #schema }}
{
  "name": "Blind Box Shop",
  "target": "section",
  "settings": [
    {
      "type": "text",
      "id": "widget_url",
      "label": "Widget URL",
      "default": "https://blind-box-beta.vercel.app/widget"
    }
  ]
}
{{ /schema }}
{{{{/raw}}}}
